<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이트 점검 중</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #4f7df5;
    --accent-glow: rgba(79, 125, 245, 0.15);
    --text: #e8e8ed;
    --muted: #6b6b7b;
    --border: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }

  @keyframes gridShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  /* Glow orb */
  .orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 4s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes pulse {
    0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
    100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 2rem;
    max-width: 560px;
  }

  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 2rem;
    border: 2px solid var(--accent);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    box-shadow: 0 0 40px var(--accent-glow);
    animation: fadeUp 0.8s ease-out both;
  }

  .icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--accent);
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid rgba(79, 125, 245, 0.2);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.8s 0.15s ease-out both;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
    animation: fadeUp 0.8s 0.3s ease-out both;
  }

  p {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s 0.45s ease-out both;
  }

  .contact {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    padding: 0.7rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    transition: all 0.3s ease;
    animation: fadeUp 0.8s 0.6s ease-out both;
  }

  .contact:hover {
    border-color: var(--accent);
    color: var(--text);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .contact svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
  }

  .footer {
    margin-top: 3rem;
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.5;
    font-family: 'DM Mono', monospace;
    animation: fadeUp 0.8s 0.75s ease-out both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .orb { width: 300px; height: 300px; }
  }
</style>
</head>
<body>

<div class="orb"></div>

<div class="container">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
  </div>

  <div class="badge">System Maintenance</div>

  <h1>더 나은 서비스를 위해<br>업데이트 중입니다</h1>

  <p>
    현재 사이트 개선 작업이 진행 중입니다.<br>
    빠른 시일 내에 새로운 모습으로 찾아뵙겠습니다.<br>
    불편을 드려 죄송합니다.
  </p>

  <a href="mailto:biz@zeon.ai.kr" class="contact">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
    biz@zeon.ai.kr
  </a>

  <div class="footer">© 2026 Your Company. All rights reserved.</div>
</div>

</body>
</html>
